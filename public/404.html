<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions Companion</title>
    <script>
      (function () {
        var base = "/pokemon_champions_strategy_companion/";
        var path = window.location.pathname;
        var route = path.indexOf(base) === 0 ? path.slice(base.length - 1) : path;
        var search = window.location.search ? "&" + window.location.search.slice(1) : "";
        window.location.replace(base + "?path=" + encodeURIComponent(route) + search + window.location.hash);
      })();
    </script>
  </head>
  <body>
    Redirection vers Champions Companion...
  </body>
</html>
